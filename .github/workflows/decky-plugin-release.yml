name: Decky Plugin Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install plugin dependencies
        working-directory: decky-plugin
        run: npm install

      - name: Typecheck plugin
        working-directory: decky-plugin
        run: npm run test

      - name: Build plugin
        working-directory: decky-plugin
        run: npm run build

      - name: Package plugin
        run: python3 scripts/package-decky-plugin.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: last-epoch-companion
          path: server/static/downloads/last-epoch-companion.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: server/static/downloads/last-epoch-companion.zip
